<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Hadiths — Two-Card Glassmorphism Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root {
  --font: "Inter", -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --font-arabic: "Noto Kufi Arabic", "Segoe UI Arabic", "Tahoma", serif;
  --radius: 16px;
  --bg:       #ffffff;
  --surface:  #f5f5f7;
  --surface2: #ebebeb;
  --border:   #e0e0e0;
  --ink:      #1d1d1f;
  --muted:    #6e6e73;
  --accent:   #4f72f8;
  --accent-2: #7c5ce6;
  --accent-3: #a0baff;
  --accent-raw:   79, 114, 248;
  --accent-2-raw: 124, 92, 230;
  --accent-3-raw: 160, 186, 255;
}
[data-theme="dark"] {
  --bg:       #060c1a;
  --surface:  #0d1629;
  --surface2: #111d35;
  --border:   rgba(255,255,255,0.10);
  --ink:      #f0f4ff;
  --muted:    #9aa9c7;
  --accent:   #4f72f8;
  --accent-2: #7c5ce6;
  --accent-3: #a0baff;
  --accent-raw:   79, 114, 248;
  --accent-2-raw: 124, 92, 230;
  --accent-3-raw: 160, 186, 255;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 40px 20px;
  transition: background 0.35s, color 0.35s;
}

/* ── Theme toggle (for preview) ── */
.theme-bar {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  display: flex; gap: 8px;
}
.theme-bar button {
  padding: 8px 16px; border-radius: 100px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--ink);
  transition: all 0.2s;
}
.theme-bar button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Section ── */
.featured-section {
  max-width: 1100px; margin: 40px auto;
  padding: 0 20px;
}
.section-label {
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 24px;
}

/* ── Two-Card Grid ── */
.featured-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 768px) {
  .featured-grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }
}

/* ── Glassmorphism Card ── */
.glass-card {
  position: relative;
  border-radius: 24px;
  padding: 36px 32px 32px;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;

  /* Glass effect */
  background: rgba(var(--accent-raw), 0.04);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid rgba(var(--accent-raw), 0.12);
  box-shadow:
    0 4px 24px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.06);
}
[data-theme="dark"] .glass-card {
  background: rgba(13, 22, 41, 0.65);
  border: 1px solid rgba(var(--accent-raw), 0.18);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.04);
}
.glass-card:hover {
  transform: translateY(-3px);
  box-shadow:
    0 12px 40px rgba(var(--accent-raw), 0.12),
    inset 0 1px 0 rgba(255,255,255,0.06);
}
[data-theme="dark"] .glass-card:hover {
  box-shadow:
    0 16px 48px rgba(var(--accent-raw), 0.15),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

/* Decorative glow orb behind card */
.glass-card::before {
  content: "";
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.glass-card.card-daily::before {
  top: -60px; left: -40px;
  background: var(--accent);
}
.glass-card.card-popular::before {
  bottom: -60px; right: -40px;
  background: var(--accent-2);
}

/* Quotation mark watermark */
.glass-card::after {
  content: "\201C";
  position: absolute; top: -14px; left: 20px;
  font-size: 110px; font-weight: 700; line-height: 1;
  color: var(--accent); opacity: 0.07;
  font-family: Georgia, serif;
  pointer-events: none; z-index: 0;
}

/* ── Card Header ── */
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; position: relative; z-index: 1;
}
.card-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase;
}
.card-daily .card-badge {
  background: rgba(var(--accent-raw), 0.12);
  color: var(--accent);
  border: 1px solid rgba(var(--accent-raw), 0.18);
}
.card-popular .card-badge {
  background: rgba(var(--accent-2-raw), 0.12);
  color: var(--accent-2);
  border: 1px solid rgba(var(--accent-2-raw), 0.18);
}
.card-badge svg {
  width: 13px; height: 13px; fill: none; stroke: currentColor;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* Read-count balloon */
.read-balloon {
  display: inline-flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, var(--accent-2), var(--accent));
  color: #fff;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 12px; font-weight: 700;
  box-shadow: 0 4px 14px rgba(var(--accent-2-raw), 0.35);
  animation: balloon-pulse 2.5s ease-in-out infinite;
}
.read-balloon svg {
  width: 13px; height: 13px; fill: none; stroke: #fff;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
@keyframes balloon-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* ── Card Title (Hadith of the Day title) ── */
.card-title {
  font-size: 15px; font-weight: 700; color: var(--ink);
  margin-bottom: 16px; position: relative; z-index: 1;
  line-height: 1.45;
}

/* ── Hadith Text ── */
.card-text {
  font-size: 15px; font-weight: 400; color: var(--ink);
  line-height: 1.7; letter-spacing: -0.01em;
  margin-bottom: 16px; position: relative; z-index: 1;
  opacity: 0.92;
}

/* ── Arabic ── */
.card-arabic {
  font-family: var(--font-arabic);
  font-size: 1.15rem; font-weight: 600;
  color: var(--ink);
  direction: rtl; text-align: right;
  line-height: 2.1;
  margin-bottom: 16px;
  position: relative; z-index: 1;
  opacity: 0.88;
}

/* ── Meta (narrator + source) ── */
.card-meta {
  font-size: 12.5px; color: var(--muted);
  font-weight: 500; line-height: 1.5;
  position: relative; z-index: 1;
  border-top: 1px solid rgba(var(--accent-raw), 0.1);
  padding-top: 14px; margin-top: 4px;
}
.card-meta .source {
  color: var(--accent); font-weight: 600;
}
.card-meta .category {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px; font-weight: 600;
  background: rgba(var(--accent-raw), 0.08);
  color: var(--accent);
  letter-spacing: 0.3px;
}

/* ── Subtle shimmer edge effect ── */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.glass-card .shimmer-edge {
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(var(--accent-raw), 0.3) 25%,
    rgba(var(--accent-2-raw), 0.4) 50%,
    rgba(var(--accent-raw), 0.3) 75%,
    transparent 100%
  );
  background-size: 200% 100%;
  animation: shimmer 4s ease-in-out infinite;
  z-index: 2;
}

/* ── Date tag ── */
.date-tag {
  font-size: 11px; color: var(--muted); font-weight: 500;
  opacity: 0.7;
}
</style>
</head>
<body>

<!-- Theme toggle for preview -->
<div class="theme-bar">
  <button onclick="document.documentElement.setAttribute('data-theme','light')">Light</button>
  <button onclick="document.documentElement.setAttribute('data-theme','dark')">Dark</button>
</div>

<section class="featured-section">
  <h2 class="section-label">Featured Hadiths</h2>

  <div class="featured-grid">

    <!-- ─── Card 1: Hadith of the Day ─── -->
    <div class="glass-card card-daily" id="dailyCard">
      <div class="shimmer-edge"></div>
      <div class="card-header">
        <span class="card-badge">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          Hadith of the Day
        </span>
        <span class="date-tag" id="dailyDate"></span>
      </div>

      <p class="card-title" id="dailyTitle"></p>
      <p class="card-text" id="dailyText"></p>
      <p class="card-arabic" id="dailyArabic"></p>
      <div class="card-meta">
        <span id="dailyMeta"></span><span class="source" id="dailySource"></span>
        <br><span class="category" id="dailyCategory"></span>
      </div>
    </div>

    <!-- ─── Card 2: Most Read Hadith ─── -->
    <div class="glass-card card-popular" id="popularCard">
      <div class="shimmer-edge"></div>
      <div class="card-header">
        <span class="card-badge">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Most Read Hadith
        </span>
        <span class="read-balloon" id="readCount">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="readNum">0</span> reads
        </span>
      </div>

      <p class="card-text" id="popularText"></p>
      <p class="card-arabic" id="popularArabic"></p>
      <div class="card-meta">
        <span id="popularMeta"></span><span class="source" id="popularSource"></span>
        <br><span class="category" id="popularCategory"></span>
      </div>
    </div>

  </div>
</section>

<script>
/* ── Hadith Data (from index-wire.js FEATURED array) ── */
var HADITHS = [
  {
    arabic: '\u0625\u0650\u0646\u0651\u064E\u0645\u064E\u0627 \u0627\u0644\u0623\u064E\u0639\u0652\u0645\u064E\u0627\u0644\u064F \u0628\u0650\u0627\u0644\u0646\u0651\u0650\u064A\u0651\u064E\u0627\u062A\u0650\u060C \u0648\u064E\u0625\u0650\u0646\u0651\u064E\u0645\u064E\u0627 \u0644\u0650\u0643\u064F\u0644\u0651\u0650 \u0627\u0645\u0652\u0631\u0650\u0626\u064D \u0645\u064E\u0627 \u0646\u064E\u0648\u064E\u0649',
    text: '\u201CActions are but by intentions, and every person will get what they intended.\u201D',
    meta: 'Narrated by Umar ibn al-Khattab (RA) \u2014 ',
    source: 'Sahih al-Bukhari 1',
    category: 'Intentions & Actions',
    title: 'The Foundation of Every Deed',
    reads: 1247
  },
  {
    arabic: '\u0644\u0627 \u064A\u0624\u0652\u0645\u0650\u0646\u064F \u0623\u064E\u062D\u064E\u062F\u064F\u0643\u064F\u0645\u0652 \u062D\u064E\u062A\u0651\u064E\u0649 \u064A\u064F\u062D\u0650\u0628\u0651\u064E \u0644\u0623\u064E\u062E\u0650\u064A\u0647\u0650 \u0645\u064E\u0627 \u064A\u064F\u062D\u0650\u0628\u0651\u064F \u0644\u0650\u0646\u064E\u0641\u0652\u0633\u0650\u0647\u0650',
    text: '\u201CNone of you will have faith until he loves for his brother what he loves for himself.\u201D',
    meta: 'Narrated by Anas ibn Malik (RA) \u2014 ',
    source: 'Sahih al-Bukhari 13',
    category: 'Love & Brotherhood',
    title: 'The Measure of True Faith',
    reads: 983
  },
  {
    arabic: '\u0627\u0644\u0645\u064F\u0633\u0644\u0650\u0645\u064F \u0645\u064E\u0646\u0652 \u0633\u064E\u0644\u0650\u0645\u064E \u0627\u0644\u0645\u064F\u0633\u0644\u0650\u0645\u064F\u0648\u0646\u064E \u0645\u0650\u0646\u0652 \u0644\u0650\u0633\u064E\u0627\u0646\u0650\u0647\u0650 \u0648\u064E\u064A\u064E\u062F\u0650\u0647\u0650',
    text: '\u201CA Muslim is the one from whose tongue and hands the Muslims are safe.\u201D',
    meta: 'Narrated by Abdullah ibn Amr (RA) \u2014 ',
    source: 'Sahih al-Bukhari 10',
    category: 'Character & Conduct',
    title: 'The Mark of a True Muslim',
    reads: 762
  },
  {
    arabic: '\u062E\u064E\u064A\u0652\u0631\u064F\u0643\u064F\u0645\u0652 \u0645\u064E\u0646\u0652 \u062A\u064E\u0639\u064E\u0644\u0651\u064E\u0645\u064E \u0627\u0644\u0642\u064F\u0631\u0652\u0622\u0646\u064E \u0648\u064E\u0639\u064E\u0644\u0651\u064E\u0645\u064E\u0647\u0650',
    text: '\u201CThe best of you are those who learn the Quran and teach it.\u201D',
    meta: 'Narrated by Uthman ibn Affan (RA) \u2014 ',
    source: 'Sahih al-Bukhari 5027',
    category: 'Knowledge & Learning',
    title: 'The Noblest Pursuit of Knowledge',
    reads: 891
  },
  {
    arabic: '\u0627\u0644\u062F\u0651\u064F\u0646\u0652\u064A\u064E\u0627 \u0633\u0650\u062C\u0652\u0646\u064F \u0627\u0644\u0645\u064F\u0624\u0652\u0645\u0650\u0646\u0650 \u0648\u064E\u062C\u064E\u0646\u0651\u064E\u0629\u064F \u0627\u0644\u0643\u064E\u0627\u0641\u0650\u0631\u0650',
    text: '\u201CThis world is a prison for the believer and a paradise for the disbeliever.\u201D',
    meta: 'Narrated by Abu Huraira (RA) \u2014 ',
    source: 'Sahih Muslim 2956',
    category: 'Faith & Belief',
    title: 'Perspective on the Life of This World',
    reads: 654
  }
];

/* ── Hadith of the Day — deterministic rotation by date ── */
function getDayOfYear() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var diff = now - start;
  return Math.floor(diff / 86400000);
}

var dailyIndex = getDayOfYear() % HADITHS.length;
var daily = HADITHS[dailyIndex];

document.getElementById('dailyTitle').textContent  = daily.title;
document.getElementById('dailyText').textContent   = daily.text;
document.getElementById('dailyArabic').textContent  = daily.arabic;
document.getElementById('dailyMeta').textContent    = daily.meta;
document.getElementById('dailySource').textContent  = daily.source;
document.getElementById('dailyCategory').textContent = daily.category;

// Format today's date nicely
var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var d = new Date();
document.getElementById('dailyDate').textContent = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();

/* ── Most Read — pick the hadith with the highest reads ── */
var sorted = HADITHS.slice().sort(function(a, b) { return b.reads - a.reads; });
var popular = sorted[0];

document.getElementById('popularText').textContent    = popular.text;
document.getElementById('popularArabic').textContent   = popular.arabic;
document.getElementById('popularMeta').textContent     = popular.meta;
document.getElementById('popularSource').textContent   = popular.source;
document.getElementById('popularCategory').textContent = popular.category;

// Animate read count
var target = popular.reads;
var el = document.getElementById('readNum');
var current = 0;
var step = Math.max(1, Math.floor(target / 60));
var timer = setInterval(function() {
  current += step;
  if (current >= target) { current = target; clearInterval(timer); }
  el.textContent = current.toLocaleString();
}, 20);
</script>
</body>
</html>
