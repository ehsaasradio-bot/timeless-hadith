<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You are Offline — Timeless Hadith</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --ink: #0a0a0a; --muted: #6b6b6b;
      --surface: #f5f5f5; --border: #e8e8e8; --accent: #2563eb;
      --font: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0a0a0a; --ink: #f0f0f0; --muted: #999;
      --surface: #161616; --border: #242424; --accent: #60a5fa;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 24px; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; max-width: 360px; margin-bottom: 32px; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--ink);
      color: var(--bg);
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    a:hover { opacity: 0.8; }
  </style>
  <script>
    (function() {
      var s = localStorage.getItem('th_theme');
      var p = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s || p);
    })();
  </script>
</head>
<body>
  <div class="icon">&#9729;</div>
  <h1>You are offline</h1>
  <p>It looks like your internet connection is unavailable. Please check your connection and try again.</p>
  <a href="/">Return to Timeless Hadith</a>
</body>
</html>
