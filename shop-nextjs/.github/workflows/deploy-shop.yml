# .github/workflows/deploy-shop.yml
# Timeless Hadith Shop — Deploy to Cloudflare Pages on push to main
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CF_API_TOKEN        — Cloudflare API token (Pages:Edit permission)
#   CF_ACCOUNT_ID       — Cloudflare account ID
#   SUPABASE_ANON_KEY   — Supabase anon key
#   SUPABASE_SERVICE_ROLE_KEY
#   ADMIN_SECRET
#   RESEND_API_KEY

name: Deploy Shop to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'shop-nextjs/**'
      - '.github/workflows/deploy-shop.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shop-nextjs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shop-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dwcsledifvnyrunxejzd.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Service key is set in Cloudflare dashboard, not needed at build time

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=timeless-hadith-shop --commit-dirty=true
          workingDirectory: shop-nextjs
