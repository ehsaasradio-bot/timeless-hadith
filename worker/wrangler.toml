name = "timeless-hadith-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"

# ─────────────────────────────────────────────────────────────
# Public (non-secret) environment variables.
# Edit this list to allow new origins to call the API.
# ─────────────────────────────────────────────────────────────
[vars]
ALLOWED_ORIGINS = "https://timelesshadith.com,https://www.timelesshadith.com,https://timeless-hadith.pages.dev,http://localhost:3000,http://localhost:8080"

# ─────────────────────────────────────────────────────────────
# Secrets are NOT stored here. Set them from the CLI:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put OPENAI_API_KEY
# ─────────────────────────────────────────────────────────────

[observability]
enabled = true
