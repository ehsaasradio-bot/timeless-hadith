<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Sign In — Timeless Hadith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000; color: #f5f5f7;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1c1c1e; border: 1px solid #38383a; border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 380px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
      color: #86868b; text-transform: uppercase; margin-bottom: 32px;
    }
    h1 { font-size: 24px; font-weight: 700; color: #f5f5f7; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #86868b; margin-bottom: 32px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="password"] {
      width: 100%; padding: 12px 16px; border: 1px solid #38383a; border-radius: 10px;
      background: #2c2c2e; color: #f5f5f7; font-size: 16px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #2997ff; }
    .btn {
      width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 10px;
      background: #2997ff; color: #fff; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover { background: #40a9ff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      margin-top: 16px; padding: 12px 16px; border-radius: 8px;
      background: rgba(255,59,48,0.12); border: 1px solid rgba(255,59,48,0.3);
      color: #ff6b6b; font-size: 13px; display: none;
    }
    .back { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: #86868b; text-decoration: none; }
    .back:hover { color: #f5f5f7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Timeless Hadith</div>
    <h1>Admin Sign In</h1>
    <p class="sub">Enter your admin password to access the CMS.</p>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Admin password" autofocus>
    <button class="btn" id="signInBtn">Sign In</button>
    <div class="error" id="errorMsg">Incorrect password. Please try again.</div>
    <a href="/" class="back">Back to site</a>
  </div>

  <script>
    var btn = document.getElementById('signInBtn');
    var inp = document.getElementById('password');
    var err = document.getElementById('errorMsg');
    var redirect = new URLSearchParams(window.location.search).get('redirect') || '/cms.html';

    btn.addEventListener('click', doLogin);
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      btn.disabled = true;
      err.style.display = 'none';
      try {
        var resp = await fetch('/api/cms-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: inp.value }),
          credentials: 'same-origin'
        });
        if (resp.ok) {
          window.location.href = redirect;
        } else {
          err.style.display = 'block';
          inp.value = '';
          inp.focus();
        }
      } catch {
        err.textContent = 'Connection error. Please try again.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
