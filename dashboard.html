<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting to My Reader · Timeless Hadith</title>
  <meta name="robots" content="noindex,follow" />
  <meta http-equiv="refresh" content="0; url=https://app.timelesshadith.com/dashboard" />
  <link rel="canonical" href="https://app.timelesshadith.com/dashboard" />
  <script>
    // Preserve any query string / hash when redirecting
    (function () {
      var dest = "https://app.timelesshadith.com/dashboard";
      try {
        var qs = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace(dest + qs + hash);
      } catch (e) {
        window.location.href = dest;
      }
    })();
  </script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
         display:grid;place-items:center;min-height:100vh;margin:0;background:#f7f8f9;color:#1a1f26;}
    .box{text-align:center;padding:24px;}
    a{color:#1f5132;}
  </style>
</head>
<body>
  <div class="box">
    <p>Redirecting you to your Reader…</p>
    <p>If you are not redirected,
      <a href="https://app.timelesshadith.com/dashboard">tap here</a>.
    </p>
  </div>
</body>
</html>
