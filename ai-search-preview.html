<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ask Timeless Hadith — AI-powered hadith search</title>
<meta name="description" content="Ask a question and discover authentic hadith guidance, powered by AI search across thousands of verified hadiths." />
<link rel="icon" type="image/png" href="timelesshadith-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    --bg: #ffffff;
    --surface: #f5f5f7;
    --surface2: #ebebeb;
    --border: #e5e5e7;
    --ink: #1d1d1f;
    --muted: #6e6e73;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-glow: rgba(0, 113, 227, 0.35);
    --card-shadow: 0 2px 12px rgba(0,0,0,0.06);
    --card-shadow-hover: 0 16px 48px rgba(0,0,0,0.12);
  }

  [data-theme="dark"] {
    --bg: #000000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: #3a3a3c;
    --ink: #f5f5f7;
    --muted: #98989d;
    --accent: #2997ff;
    --accent-hover: #40a8ff;
    --accent-glow: rgba(41, 151, 255, 0.45);
    --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
    --card-shadow-hover: 0 16px 48px rgba(0,0,0,0.6);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.35s ease, color 0.35s ease;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav.main-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  [data-theme="dark"] nav.main-nav { background: rgba(0,0,0,0.85); }
  .nav-logo { display: inline-flex; align-items: center; text-decoration: none; }
  .nav-logo img { height: 26px; width: auto; filter: brightness(0); transition: filter 0.35s ease; }
  [data-theme="dark"] .nav-logo img { filter: brightness(0) invert(1); }
  .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
  .nav-links a {
    font-size: 14px; font-weight: 400; color: var(--muted);
    text-decoration: none; letter-spacing: -0.1px;
    transition: color 0.2s ease;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .theme-toggle {
    width: 44px; height: 26px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 100px;
    cursor: pointer; position: relative; flex-shrink: 0;
    transition: all 0.35s ease;
  }
  .theme-toggle::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; background: var(--ink);
    border-radius: 50%; transition: left 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] .theme-toggle::after { left: 20px; }

  /* HERO WRAPPER */
  main {
    flex: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 120px 24px 80px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* GREETING */
  .greeting {
    text-align: center;
    font-size: clamp(18px, 2vw, 22px);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .greeting .arabic {
    display: block;
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0;
  }
  .greeting .gradient {
    background: linear-gradient(135deg, var(--accent), #00c2ff 50%, #0056b3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* SEARCH BOX */
  .search-card {
    width: 100%;
    max-width: 760px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: var(--card-shadow);
    padding: 18px 20px 14px;
    margin-top: 40px;
    transition: box-shadow 0.25s ease, border-color 0.25s ease, background 0.35s ease;
  }
  .search-card:focus-within {
    border-color: var(--accent);
    box-shadow: var(--card-shadow-hover), 0 0 0 4px rgba(0,113,227,0.1);
  }
  .search-input-row {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 6px;
  }
  .typing-caret {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .search-spark {
    flex-shrink: 0;
    width: 22px; height: 22px;
    color: var(--accent);
    margin-top: 3px;
  }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font);
    font-size: 16px;
    color: var(--ink);
    line-height: 1.5;
    resize: none;
    min-height: 28px;
    letter-spacing: -0.1px;
  }
  .search-input::placeholder {
    color: var(--muted);
    opacity: 0.7;
  }

  .search-actions {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding-top: 4px;
    border-top: 1px solid var(--border);
    padding: 12px 4px 0;
  }
  .search-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .action-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px; font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    font-family: var(--font);
    letter-spacing: -0.1px;
    transition: all 0.2s ease;
  }
  .action-chip:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .action-chip svg { width: 14px; height: 14px; }

  .search-right { display: flex; align-items: center; gap: 10px; }
  .citation-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted);
    font-weight: 500;
  }
  .toggle-pill {
    width: 34px; height: 20px; border-radius: 100px;
    background: var(--accent);
    position: relative; cursor: pointer;
    transition: background 0.2s ease;
  }
  .toggle-pill::after {
    content: '';
    position: absolute;
    top: 2px; right: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.2s ease;
  }
  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .send-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .send-btn svg { width: 18px; height: 18px; color: #fff; }

  /* EXAMPLE PROMPTS */
  .examples-label {
    margin-top: 48px;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--muted);
    align-self: flex-start;
    margin-left: 8px;
  }

  .example-grid {
    width: 100%;
    max-width: 760px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-top: 16px;
  }
  .example-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
  }
  .example-card:hover {
    background: var(--bg);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--card-shadow-hover);
  }
  .example-card p {
    font-size: 13px;
    line-height: 1.45;
    color: var(--ink);
    letter-spacing: -0.1px;
    font-weight: 500;
  }
  .example-icon {
    width: 22px; height: 22px;
    color: var(--muted);
    margin-top: 12px;
  }
  .example-card:hover .example-icon { color: var(--accent); }

  /* DISCLAIMER */
  .disclaimer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: -0.1px;
    max-width: 560px;
    line-height: 1.6;
  }
  .disclaimer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .disclaimer a:hover { text-decoration: underline; }

  /* RESPONSIVE */
  @media (max-width: 820px) {
    .example-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 680px) {
    nav.main-nav { padding: 0 20px; }
    .nav-links li:nth-child(1), .nav-links li:nth-child(2) { display: none; }
    main { padding: 96px 20px 60px; }
  }
  @media (max-width: 440px) {
    .example-grid { grid-template-columns: 1fr; }
    .greeting { font-size: 18px; }
  }
</style>
</head>
<body>

  <!-- NAV -->
  <nav class="main-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-logo">
      <img src="timelesshadith-logo.png" alt="Timeless Hadith" width="130" height="26" />
    </a>
    <ul class="nav-links">
      <li><a href="categories.html">Browse</a></li>
      <li><a href="bookmarks.html">Bookmarks</a></li>
      <li><a href="about.html">About</a></li>
      <li>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
      </li>
    </ul>
  </nav>

  <!-- HERO -->
  <main>
    <h1 class="greeting">
      <span class="arabic">السَّلَامُ عَلَيْكُمْ</span>
      Peace be upon you, Syed<br />
      What wisdom do you <span class="gradient">seek today?</span>
    </h1>

    <!-- SEARCH CARD -->
    <form class="search-card" role="search" onsubmit="event.preventDefault();">
      <div class="search-input-row">
        <svg class="search-spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.4 7.4L22 12l-7.6 2.6L12 22l-2.4-7.4L2 12l7.6-2.6z"/>
        </svg>
        <textarea
          class="search-input"
          placeholder=""
          rows="1"
          aria-label="Ask a question about hadith"
        ></textarea>
        <button type="submit" class="send-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </form>

    <p class="examples-label">Get started with a question below</p>

    <div class="example-grid">
      <button class="example-card" type="button">
        <p>Find hadiths on patience during hardship</p>
        <svg class="example-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>

      <button class="example-card" type="button">
        <p>What did the Prophet (PBUH) say about kindness?</p>
        <svg class="example-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <button class="example-card" type="button">
        <p>Guidance on parenting and family from hadith</p>
        <svg class="example-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>

      <button class="example-card" type="button">
        <p>Explain the etiquette of daily prayer</p>
        <svg class="example-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z"/>
        </svg>
      </button>
    </div>

    <p class="disclaimer">
      Answers are grounded in 7,000+ authenticated hadiths. Every response
      includes the original source and narrator chain. <a href="about.html">Learn how it works →</a>
    </p>
  </main>

  <script>
    // Theme persistence
    (function() {
      var html = document.documentElement;
      var saved = localStorage.getItem('th_theme') || 'light';
      html.setAttribute('data-theme', saved);
      document.getElementById('themeToggle').addEventListener('click', function() {
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('th_theme', next);
      });
    })();

    // Time-based greeting
    (function() {
      var hour = new Date().getHours();
      var greeting;
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 17) greeting = 'Good afternoon';
      else greeting = 'Good evening';
      document.title = greeting + ' — Ask Timeless Hadith';
    })();

    // Auto-grow textarea
    var ta = document.querySelector('.search-input');
    if (ta) {
      ta.addEventListener('input', function() {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
      });
    }

    // Example card → fill input (cancels typing animation)
    document.querySelectorAll('.example-card').forEach(function(card) {
      card.addEventListener('click', function() {
        stopTyping();
        ta.value = card.querySelector('p').textContent;
        ta.focus();
        ta.dispatchEvent(new Event('input'));
      });
    });

    // Typewriter placeholder animation
    var typingTimer = null;
    var typingActive = true;
    var phrases = [
      'Find hadiths on patience during hardship',
      'What did the Prophet say about kindness?',
      'Show me hadiths about parenting & family',
      'Explain the etiquette of daily prayer'
    ];
    function stopTyping() {
      typingActive = false;
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      if (ta) ta.setAttribute('placeholder', '');
    }
    function typeLoop(pIndex, charIndex, deleting) {
      if (!typingActive || !ta) return;
      var full = phrases[pIndex];
      var current = deleting
        ? full.substring(0, charIndex - 1)
        : full.substring(0, charIndex + 1);
      ta.setAttribute('placeholder', current);
      var delay = deleting ? 28 : 55;
      if (!deleting && current === full) {
        delay = 1800; // hold full phrase
        deleting = true;
      } else if (deleting && current === '') {
        deleting = false;
        pIndex = (pIndex + 1) % phrases.length;
        delay = 400;
      } else {
        charIndex = deleting ? charIndex - 1 : charIndex + 1;
      }
      typingTimer = setTimeout(function() {
        typeLoop(pIndex, charIndex, deleting);
      }, delay);
    }
    if (ta) {
      ta.addEventListener('focus', stopTyping, { once: true });
      typeLoop(0, 0, false);
    }
  </script>
</body>
</html>
