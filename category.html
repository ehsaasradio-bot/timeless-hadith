  <style>
    /* ── Accessibility ── */
    .skip-link {
      position: absolute; top: -100px; left: 16px;
      background: #0a0a0a; color: #fff; padding: 8px 16px;
      border-radius: 0 0 8px 8px; font-size: 14px; font-weight: 600;
      z-index: 9999; text-decoration: none; transition: top 0.2s ease;
    }
    .skip-link:focus { top: 0; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --bg:       #ffffff;
      --surface:  #f5f5f5;
      --border:   #e8e8e8;
      --ink:      #0a0a0a;
      --muted:    #6b6b6b;
      --nav-bg:   rgba(255,255,255,0.85);
      --toggle-bg:   #e8e8e8;
      --toggle-knob: #0a0a0a;
      --toggle-icon: #6b6b6b;
      --cobalt:   #1B5BE8;        /* cobalt blue for category page only */
      --cobalt-dk: #3D74F5;       /* cobalt in dark mode */
    }

    [data-theme="dark"] {
      --bg:       #0a0a0a;
      --surface:  #161616;
      --border:   #242424;
      --ink:      #f0f0f0;
      --muted:    #999999;
      --nav-bg:   rgba(10,10,10,0.85);
      --toggle-bg:   #242424;
      --toggle-knob: #f0f0f0;
      --toggle-icon: #999999;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: var(--nav-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo img {
      height: 26px;
      width: auto;
      filter: brightness(0);
      transition: filter 0.3s ease;
    }

    [data-theme="dark"] .nav-logo img {
      filter: brightness(0) invert(1);
    }

    .nav-links {
      display: flex; align-items: center;
      gap: 32px; list-style: none;
    }

    .nav-links a {
      font-size: 14px; font-weight: 400;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s ease; letter-spacing: -0.1px;
    }

    .nav-links a:hover { color: var(--ink); }

    .nav-cta {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 20px;
      background: var(--ink); color: var(--bg);
      border-radius: 100px; font-size: 14px; font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s ease, background 0.3s ease, color 0.3s ease;
    }

    .nav-cta:hover { opacity: 0.7; }
    html[data-lang="tr"] .lang-btn[data-lang="tr"],
    html[data-lang="en"] .lang-btn[data-lang="en"] { }

    /* ── Theme Toggle ── */
    .theme-toggle {
      width: 44px; height: 26px;
      background: var(--toggle-bg);
      border-radius: 100px; border: none;
      cursor: pointer; position: relative;
      flex-shrink: 0;
      transition: background 0.3s ease; outline: none;
    }

    .theme-toggle:focus-visible { box-shadow: 0 0 0 2px var(--ink); }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px;
      transition: opacity 0.25s ease;
      stroke: var(--toggle-icon); fill: none; stroke-width: 1.8;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .theme-toggle .icon-sun  { left: 6px; }
    .theme-toggle .icon-moon { right: 5px; }

    [data-theme="light"] .theme-toggle .icon-moon { opacity: 0; }
    [data-theme="light"] .theme-toggle .icon-sun  { opacity: 1; }
    [data-theme="dark"]  .theme-toggle .icon-sun  { opacity: 0; }
    [data-theme="dark"]  .theme-toggle .icon-moon { opacity: 1; }

    .theme-toggle::after {
      content: ""; position: absolute; top: 3px;
      width: 20px; height: 20px;
      background: var(--toggle-knob); border-radius: 50%;
      transition: left 0.28s cubic-bezier(0.4,0,0.2,1), background 0.3s ease;
    }

    [data-theme="light"] .theme-toggle::after { left: 3px; }
    [data-theme="dark"]  .theme-toggle::after { left: 21px; }

    /* ── Hamburger ── */
    .nav-hamburger {
      display: none; flex-direction: column;
      justify-content: center; gap: 5px;
      width: 40px; height: 40px;
      background: none; border: none;
      cursor: pointer; padding: 8px; border-radius: 8px;
      transition: background 0.2s ease;
    }

    .nav-hamburger:hover { background: var(--surface); }

    .nav-hamburger span {
      display: block; width: 100%; height: 1.5px;
      background: var(--ink); border-radius: 2px;
      transition: background 0.3s ease;
    }

    .nav-drawer {
      display: none; position: fixed;
      top: 64px; left: 0; right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px 24px;
      z-index: 99; flex-direction: column; gap: 4px;
      transition: background 0.3s ease;
    }

    .nav-drawer.open { display: flex; }

    .nav-drawer a {
      font-size: 16px; color: var(--muted);
      text-decoration: none; padding: 12px 4px;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s ease;
    }

    .nav-drawer a:hover { color: var(--ink); }
    .nav-drawer a:last-of-type { border-bottom: none; }

    .nav-drawer .drawer-cta {
      margin-top: 8px; padding: 14px;
      background: var(--ink); color: var(--bg);
      border-radius: 12px; text-align: center;
      font-weight: 500; border-bottom: none !important;
      transition: opacity 0.2s ease, background 0.3s ease, color 0.3s ease;
    }

    .drawer-controls {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 4px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    /* ── Hero ── */
    .cat-hero {
      padding: 104px 40px 56px;
      max-width: 1100px; margin: 0 auto;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 400;
      color: var(--muted); text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.2s ease; letter-spacing: -0.1px;
    }

    .back-link:hover { color: var(--ink); }

    .back-link svg {
      width: 14px; height: 14px; stroke: currentColor;
      fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .cat-label {
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }

    .cat-title {
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 700; letter-spacing: -0.04em;
      line-height: 1.1; color: var(--ink);
      margin-bottom: 16px; max-width: 700px;
    }

    .cat-desc {
      font-size: 16px; color: var(--muted);
      line-height: 1.6; max-width: 560px; letter-spacing: -0.1px;
    }

    /* ── Section ── */
    .section-divider {
      width: 100%; max-width: 1100px;
      margin: 0 auto; height: 1px;
      background: var(--border); transition: background 0.3s ease;
    }

    .hadiths-section {
      padding: 56px 40px 100px;
      max-width: 1100px; margin: 0 auto;
    }

    /* ── Hadith Cards Grid ── */
    .hadiths-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .hadith-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 28px 28px;
      display: flex; flex-direction: column; gap: 14px;
      transition: box-shadow 0.25s ease, transform 0.25s ease, background 0.3s ease;
    }

    .hadith-card:hover {
      box-shadow: 0 12px 48px rgba(0,0,0,0.09);
      transform: translateY(-2px);
    }

    [data-theme="dark"] .hadith-card:hover {
      box-shadow: 0 12px 48px rgba(255,255,255,0.05);
    }

    /* ── Card Top Row: round number (left) + individual lang toggle (right) ── */
    .card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hadith-number {
      width: 30px; height: 30px;
      background: var(--ink); color: var(--bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ── Hadith Text — regular weight, no italic ── */
    .hadith-text {
      font-size: 15px; font-weight: 400;
      color: var(--ink); line-height: 1.7;
      letter-spacing: -0.1px;
      font-style: normal;          /* explicitly normal — no italic */
      transition: color 0.3s ease;
    }

    .hadith-text::before { content: "\201C"; }
    .hadith-text::after  { content: "\201D"; }

    .hadith-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: auto; padding-top: 14px;
      border-top: 1px solid var(--border);
      transition: border-color 0.3s ease;
    }

    .hadith-ref {
      font-size: 12px; font-weight: 500;
      color: var(--muted); letter-spacing: -0.1px;
      transition: color 0.3s ease;
    }

    .hadith-id {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.2px; transition: color 0.3s ease;
    }

    /* ── 404 ── */
    .not-found {
      text-align: center; padding: 120px 40px;
    }

    .not-found h2 {
      font-size: 28px; font-weight: 600;
      color: var(--ink); margin-bottom: 12px;
    }

    .not-found p {
      color: var(--muted); font-size: 15px; margin-bottom: 32px;
    }

    .btn-home {
      display: inline-flex; align-items: center;
      padding: 12px 28px; background: var(--ink); color: var(--bg);
      border-radius: 100px; font-size: 14px; font-weight: 500;
      text-decoration: none; transition: opacity 0.2s ease;
    }

    .btn-home:hover { opacity: 0.75; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px;
      transition: border-color 0.3s ease;
    }

    .footer-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }

    .footer-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .footer-logo img {
      height: 16px;
      width: auto;
      filter: brightness(0);
      transition: filter 0.3s ease;
    }

    [data-theme="dark"] .footer-logo img {
      filter: brightness(0) invert(1);
    }

    .footer-links { display: flex; gap: 24px; list-style: none; }

    .footer-links a {
      font-size: 13px; color: var(--muted);
      text-decoration: none; transition: color 0.2s ease;
    }

    .footer-links a:hover { color: var(--ink); }

    .footer-copy {
      font-size: 12px; color: var(--muted); letter-spacing: -0.1px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .hadiths-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .cat-hero { padding: 84px 20px 40px; }
      .hadiths-section { padding: 40px 20px 80px; }
      footer { padding: 32px 20px; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 20px; }
    }
  </style>
</head>

  <script defer>
    /* ── Safe localStorage helper ── */
    const store = {
      get(k)    { try { return localStorage.getItem(k); }  catch(e) { return null; } },
      set(k, v) { try { localStorage.setItem(k, v); }      catch(e) {} },
    };

    /* ── Theme ── */
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const saved  = store.get('theme');
    if (saved === 'light' || saved === 'dark') html.setAttribute('data-theme', saved);

    function applyTheme() {
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      store.set('theme', next);
    }
    toggle.addEventListener('click', applyTheme);
    const toggleDrawer = document.getElementById('themeToggleDrawer');
    if (toggleDrawer) toggleDrawer.addEventListener('click', applyTheme);

    /* ── Mobile menu ── */
    const burger = document.getElementById('hamburger');
    const drawer = document.getElementById('navDrawer');

    burger.addEventListener('click', () => drawer.classList.toggle('open'));
    document.addEventListener('click', e => {
      if (!e.target.closest('nav') && !e.target.closest('.nav-drawer'))
        drawer.classList.remove('open');
    });

    /* ── Category Data ── */
    const CATS = {
      'faith-belief': {
        name: 'Faith & Belief',
        desc: 'Hadiths on the pillars of faith, sincerity of intention, and building a strong relationship with Allah.',
        hadiths: [
          { n: 1,
            en: 'Islam is built upon five pillars: testifying that there is no god but Allah and that Muhammad is the Messenger of Allah, establishing prayer, paying Zakat, performing Hajj, and fasting in Ramadan.',
            ref: 'Sahih al-Bukhari 8; Sahih Muslim 16' },
          { n: 2,
            en: 'Iman has over seventy branches — the highest of which is to say "La ilaha illallah," and the least of which is to remove a harmful thing from the road.'Lā ilāha illallāh,' wa adnāhā imāṭatu al-adhā ʿan al-ṭarīq.',
            ref: 'Sahih al-Bukhari 9; Sahih Muslim 35' },
          { n: 3,
            en: 'None of you truly believes until he loves for his brother what he loves for himself.',
            ref: 'Sahih al-Bukhari 13; Sahih Muslim 45' },
          { n: 4,
            en: 'The most beloved deeds to Allah are those done consistently, even if they are few.',
            ref: 'Sahih al-Bukhari 6465; Sahih Muslim 783' },
        ]
      },
      'character-conduct': {
        name: 'Character & Conduct',
        desc: 'Prophetic guidance on manners, kindness, honesty, and treating others with dignity and compassion.',
        hadiths: [
          { n: 1, en: 'I was sent only to perfect good character.', ref: 'Musnad Ahmad 8952; al-Bayhaqi' },
          { n: 2, en: 'The heaviest thing placed on the scale of a believer on the Day of Resurrection will be good character. Allah hates those who are obscene and foul-mouthed.', ref: 'Sunan Abu Dawud 4799; Jami al-Tirmidhi 2002' },
          { n: 3, en: 'The best of you are those who have the best manners and character.', ref: 'Sahih al-Bukhari 3559' },
          { n: 4, en: 'Whoever believes in Allah and the Last Day should speak a good word or remain silent.', ref: 'Sahih al-Bukhari 6018; Sahih Muslim 47' },
        ]
      },
      'prayer-worship': {
        name: 'Prayer & Worship',
        desc: 'Guidance on Salah, dhikr, and drawing closer to Allah through consistent acts of worship.',
        hadiths: [

    /* ── Helpers ── */
    // Safely set text content (avoids XSS from any data source)
    function setText(el, text) { if (el) el.textContent = text; }
    function setAttr(id, attr, val) {
      const el = document.getElementById(id) || document.querySelector(attr ? `[${attr}]` : `#${id}`);
      if (el) el.setAttribute(attr || 'content', val);
    }
    // Update all dynamic meta tags for SEO/social
    function updateMeta(title, desc, url) {
      document.title = title;
      document.querySelector('meta[name="description"]')  && (document.querySelector('meta[name="description"]').content  = desc);
      document.getElementById('canonicalTag')             && (document.getElementById('canonicalTag').href              = url);
      document.getElementById('ogTitle')                  && (document.getElementById('ogTitle').content                = title);
      document.getElementById('ogDesc')                   && (document.getElementById('ogDesc').content                 = desc);
      document.getElementById('ogUrl')                    && (document.getElementById('ogUrl').content                  = url);
      document.getElementById('twTitle')                  && (document.getElementById('twTitle').content                = title);
      document.getElementById('twDesc')                   && (document.getElementById('twDesc').content                 = desc);
      // Update Schema.org
      const schema = document.getElementById('schemaScript');
      if (schema) {
        schema.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "CollectionPage",
          "name": title,
          "description": desc,
          "url": url,
          "isPartOf": { "@type": "WebSite", "url": "https://timelesshadith.com/" }
        });
      }
    }

    /* ── Render Page ── */
    const params  = new URLSearchParams(window.location.search);
    const catSlug = params.get('cat') || '';
    const cat     = CATS[catSlug];
    const content = document.getElementById('pageContent');

    if (!cat) {
      // Not found — use DOM API (no innerHTML with dynamic data)
      const wrap = document.createElement('div');
      wrap.className = 'not-found';
      const h2 = document.createElement('h2');
      h2.textContent = 'Category not found';
      const p = document.createElement('p');
      p.textContent = "The category you're looking for doesn't exist yet.";
      const a = document.createElement('a');
      a.href = 'index.html';
      a.className = 'btn-home';
      a.textContent = '← Back to Home';
      wrap.append(h2, p, a);
      content.appendChild(wrap);
    } else {
      // Update all SEO meta tags dynamically
      const pageTitle = `${cat.name} Hadiths — Timeless Hadith`;
      const pageDesc  = cat.desc.length > 155 ? cat.desc.slice(0, 152) + '…' : cat.desc;
      const pageUrl   = `https://timelesshadith.com/category.html?cat=${catSlug}`;
      updateMeta(pageTitle, pageDesc, pageUrl);

      // Build the page using DOM API for text nodes (XSS-safe)
      // Static HTML structure (no user data injected)
      const hero = document.createElement('div');
      hero.className = 'cat-hero';
      hero.innerHTML = `
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          All Categories
        </a>
        <p class="cat-label">Category</p>
        <h1 class="cat-title"></h1>
        <p class="cat-desc"></p>`;
      // Safely set text from data (not injected as HTML)
      hero.querySelector('.cat-title').textContent = cat.name;
      hero.querySelector('.cat-desc').textContent  = cat.desc;

      const divider = document.createElement('div');
      divider.className = 'section-divider';

      const section = document.createElement('section');
      section.className = 'hadiths-section';
      section.setAttribute('aria-label', `${cat.name} hadiths`);
      const grid = document.createElement('div');
      grid.className = 'hadiths-grid';

      cat.hadiths.forEach(h => {
        const card = document.createElement('div');
        card.className = 'hadith-card';
        card.innerHTML = `
          <div class="card-top-row">
            <div class="hadith-number"></div>
          </div>
          <p class="hadith-text"></p>
          <div class="hadith-footer">
            <span class="hadith-ref"></span>
            <span class="hadith-id"></span>
          </div>`;
        // Set all text safely via textContent
        card.querySelector('.hadith-number').textContent = h.n;
        card.querySelector('.hadith-text').textContent   = h.en;
        card.querySelector('.hadith-ref').textContent    = h.ref;
        card.querySelector('.hadith-id').textContent     = `Hadith #${h.n}`;
        grid.appendChild(card);
      });

      section.appendChild(grid);
      content.append(hero, divider, section);
    }
  </script>
