<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Timeless Hadith</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://timelesshadith.com/" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --ink: #0a0a0a; --muted: #6b6b6b;
      --surface: #f5f5f5; --border: #e8e8e8; --radius: 16px;
      --font: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0a0a0a; --ink: #f0f0f0; --muted: #999;
      --surface: #161616; --border: #242424;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .error-code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--surface);
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: var(--muted);
      max-width: 360px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--ink);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }
    .btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="error-code" aria-hidden="true">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="index.html" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to Homepage
  </a>
  <script>
    const s = localStorage.getItem('theme');
    if (s === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</body>
</html>
