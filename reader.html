<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hadith Reader — Timeless Hadith</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="stylesheet" href="css/styles.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gulzar&display=swap" rel="stylesheet" />
  <script>(function(){try{var m='th_theme_default_v3';if(!localStorage.getItem(m)){localStorage.setItem(m,'1');}var s=localStorage.getItem('th_theme');document.documentElement.setAttribute('data-theme',s||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>

  <style>
    /* ── Layout ── */
    .reader-wrap { max-width: 760px; margin: 88px auto 100px; padding: 0 20px; }

    /* ── Glass card ── */
    .glass-card {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.88) 0%,
        rgba(255,255,255,0.70) 100%
      );
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.75);
      border-top-color: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow:
        0 2px 0 0 rgba(255,255,255,0.9) inset,
        0 8px 32px rgba(0,0,0,0.09),
        0 1px 2px rgba(0,0,0,0.05);
      position: relative;
    }
    [data-theme="dark"] .glass-card {
      background: linear-gradient(
        135deg,
        rgba(30,38,70,0.85) 0%,
        rgba(18,24,48,0.78) 100%
      );
      border-color: rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.18);
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.08) inset,
        0 8px 40px rgba(0,0,0,0.45),
        0 1px 2px rgba(0,0,0,0.3);
    }

    /* ── Top nav row (prev / title / next) ── */
    .reader-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 8px;
    }
    .reader-nav-title { font-size: 13px; color: var(--muted); text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-nav {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 600;
      background: var(--surface); color: var(--ink); border: 1px solid var(--border);
      cursor: pointer; font-family: var(--font); text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-nav:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Toolbar (jump + font + urdu) ── */
    .reader-toolbar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
      margin-bottom: 16px; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px;
    }
    .reader-jump { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 160px; }
    .reader-jump input {
      width: 90px; padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--ink);
      font-family: var(--font); font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    .reader-jump input:focus { border-color: var(--accent); }
    .reader-jump input::placeholder { color: var(--muted); }
    .btn-jump {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--ink); font-size: 13px; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .btn-jump:hover { border-color: var(--accent); color: var(--accent); }
    .toolbar-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .font-controls { display: flex; align-items: center; gap: 4px; }
    .font-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-right: 2px; }
    .btn-font {
      width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--ink); font-size: 13px; font-weight: 700;
      font-family: var(--font); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: border-color 0.15s, background 0.15s;
    }
    .btn-font:hover { border-color: var(--accent); background: var(--surface2, var(--surface)); }
    .btn-urdu {
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--ink); font-size: 14px; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: all 0.15s;
      direction: rtl; letter-spacing: 0;
    }
    .btn-urdu:hover, .btn-urdu.active { border-color: var(--accent); color: var(--accent); background: rgba(79,114,248,0.07); }

    /* ── Sign-in banner ── */
    .signin-banner {
      display: none; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
      padding: 13px 18px;
      background: rgba(79,114,248,0.07); border: 1px solid rgba(79,114,248,0.2);
      border-radius: 14px;
    }
    .signin-banner span { font-size: 13px; color: var(--ink); }
    .btn-signin-sm {
      padding: 7px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 100px; font-size: 13px; font-weight: 600;
      font-family: var(--font); cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-signin-sm:hover { opacity: 0.88; }

    /* ── Main hadith card ── */
    .hadith-card-inner { padding: 32px 36px; }
    @media (max-width: 600px) { .hadith-card-inner { padding: 24px 20px; } }

    /* ── Meta chips ── */
    .hadith-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 26px; }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 100px;
      font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em;
      background: rgba(79,114,248,0.08); color: var(--accent);
      border: 1px solid rgba(79,114,248,0.18);
    }

    /* ── Arabic text ── */
    .hadith-arabic {
      font-family: 'Amiri', 'Scheherazade New', serif;
      font-size: var(--reader-ar-size, 28px); line-height: 2.1;
      text-align: right; direction: rtl; color: var(--ink);
      padding: 24px 28px;
      background: linear-gradient(
        135deg,
        rgba(79,114,248,0.07) 0%,
        rgba(79,114,248,0.03) 100%
      );
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      margin-bottom: 26px;
      border: 1px solid rgba(79,114,248,0.14);
      border-top-color: rgba(79,114,248,0.22);
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.8) inset,
        0 2px 12px rgba(79,114,248,0.06);
    }
    [data-theme="dark"] .hadith-arabic {
      background: linear-gradient(
        135deg,
        rgba(79,114,248,0.13) 0%,
        rgba(79,114,248,0.07) 100%
      );
      border-color: rgba(79,114,248,0.22);
      border-top-color: rgba(79,114,248,0.35);
      box-shadow:
        0 1px 0 0 rgba(79,114,248,0.10) inset,
        0 2px 14px rgba(79,114,248,0.12);
    }

    /* ── English text ── */
    .hadith-english {
      font-size: var(--reader-en-size, 17px); line-height: 1.8; color: var(--ink);
      margin-bottom: 22px; padding: 0 2px;
      font-style: italic; letter-spacing: -0.01em;
    }

    /* ── Urdu text ── */
    .hadith-urdu {
      font-family: 'Gulzar', serif;
      font-size: calc(var(--reader-ar-size, 28px) * 0.786); line-height: 2.2;
      text-align: right; direction: rtl; color: var(--ink);
      padding: 22px 26px;
      background: linear-gradient(
        135deg,
        rgba(16,185,129,0.08) 0%,
        rgba(16,185,129,0.04) 100%
      );
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border-radius: 16px;
      margin-bottom: 22px;
      border: 1px solid rgba(16,185,129,0.22);
      border-top-color: rgba(16,185,129,0.35);
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.7) inset,
        0 4px 20px rgba(16,185,129,0.08);
      display: none;
    }
    .hadith-urdu.visible { display: block; }
    [data-theme="dark"] .hadith-urdu {
      background: linear-gradient(
        135deg,
        rgba(16,185,129,0.12) 0%,
        rgba(16,185,129,0.06) 100%
      );
      border-color: rgba(16,185,129,0.25);
      border-top-color: rgba(16,185,129,0.40);
      box-shadow:
        0 1px 0 0 rgba(16,185,129,0.12) inset,
        0 4px 24px rgba(16,185,129,0.12);
    }
    .urdu-label {
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #10b981; margin-bottom: 10px; display: block; direction: ltr; text-align: left;
      font-family: var(--font);
    }

    /* ── Narrator / reference ── */
    .hadith-narrator {
      font-size: 13px; color: var(--muted);
      padding: 11px 16px; background: var(--surface);
      border-radius: 10px; margin-bottom: 22px;
      border-left: 3px solid var(--accent); line-height: 1.6;
    }
    [data-theme="dark"] .hadith-narrator { background: rgba(255,255,255,0.05); }

    /* ── Reading time ── */
    .reading-time { font-size: 12px; color: var(--muted); margin-bottom: 26px; display: flex; align-items: center; gap: 5px; }

    /* ── Action bar ── */
    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-action {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 100px;
      font-size: 13.5px; font-weight: 600;
      border: none; cursor: pointer; font-family: var(--font);
      transition: all 0.18s ease;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-read-done { background: #16a34a; color: #fff; }
    .btn-read-done:hover { opacity: 0.88; }
    .btn-bookmark-active { background: #f59e0b !important; color: #fff !important; border-color: #f59e0b !important; }

    /* ── Skeleton ── */
    .skeleton { background: var(--border); border-radius: 8px; animation: pulse 1.4s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ── Error state ── */
    .error-state { padding: 60px 20px; text-align: center; }

    /* ── Points toast ── */
    .points-toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--accent); color: #fff;
      padding: 12px 20px; border-radius: 14px;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 8px 32px rgba(79,114,248,0.4);
      opacity: 0; transform: translateY(16px);
      transition: all 0.28s ease; z-index: 9999; pointer-events: none;
    }
    .points-toast.show { opacity: 1; transform: translateY(0); }

    /* ── Notes modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg); border-radius: 20px;
      padding: 28px; width: 100%; max-width: 480px; margin: 20px;
      border: 1px solid var(--border); box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    }
    .modal-box h3 { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
    .modal-box textarea {
      width: 100%; height: 140px; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); color: var(--ink);
      font-family: var(--font); font-size: 14px; resize: vertical; outline: none;
    }
    .modal-box textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; }

    @media (max-width: 600px) {
      .hadith-arabic { font-size: max(18px, calc(var(--reader-ar-size, 28px) - 4px)); }
      .hadith-english { font-size: max(14px, calc(var(--reader-en-size, 17px) - 1px)); }
      .action-bar { flex-direction: column; }
      .btn-action { justify-content: center; }
      .toolbar-sep { display: none; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

  <nav class="main-nav" aria-label="Main navigation">

    <a href="reader.html" class="active">Reader</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="about.html">About</a>
  </nav>

  <main class="reader-wrap">

    <!-- Prev / Next nav row -->
    <div class="reader-nav" id="readerNav" style="display:none">
      <button class="btn-nav" id="btnPrev">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <span class="reader-nav-title" id="navTitle">Hadith Reader</span>
      <button class="btn-nav" id="btnNext">
        Next
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- Toolbar: jump + font size + urdu -->
    <div class="reader-toolbar" id="readerToolbar" style="display:none">
      <div class="reader-jump">
        <input type="number" id="jumpInput" placeholder="Hadith #…" min="1" aria-label="Jump to hadith number"/>
        <button class="btn-jump" id="jumpBtn" type="button">Go</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="font-controls">
        <span class="font-label">Aa</span>
        <button class="btn-font" id="fontDecrease" type="button" aria-label="Decrease font size">−</button>
        <button class="btn-font" id="fontIncrease" type="button" aria-label="Increase font size">+</button>
      </div>
      <div class="toolbar-sep"></div>
      <button class="btn-urdu" id="urduToggle" type="button" aria-label="Toggle Urdu translation" aria-pressed="false">اردو</button>
    </div>

    <!-- Skeleton loader -->
    <div id="skeletonLoader" class="glass-card" style="padding:36px">
      <div class="skeleton" style="height:14px;width:220px;margin-bottom:22px;border-radius:100px"></div>
      <div class="skeleton" style="height:90px;margin-bottom:22px;border-radius:14px"></div>
      <div class="skeleton" style="height:18px;margin-bottom:10px"></div>
      <div class="skeleton" style="height:18px;width:82%;margin-bottom:10px"></div>
      <div class="skeleton" style="height:18px;width:65%;margin-bottom:28px"></div>
      <div class="skeleton" style="height:38px;width:160px;border-radius:100px"></div>
    </div>

    <!-- Error state -->
    <div id="errorState" class="glass-card error-state" style="display:none">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" style="margin-bottom:14px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <p style="color:var(--muted);font-size:15px;margin-bottom:20px" id="errorMsg">Hadith not found.</p>
      <a href="categories.html" style="color:var(--accent);font-weight:600;font-size:14px">Browse all hadiths →</a>
    </div>

    <!-- Sign-in banner -->
    <div class="signin-banner" id="signInBanner">
      <span>Sign in to track reading progress, earn points &amp; save bookmarks.</span>
      <button id="signInBannerBtn" class="btn-signin-sm" type="button">Sign in with Google</button>
    </div>

    <!-- Main hadith card -->
    <div id="hadithCard" class="glass-card" style="display:none">
      <div class="hadith-card-inner">

        <!-- Meta chips -->
        <div class="hadith-meta" id="hadithMeta"></div>

        <!-- Arabic -->
        <div class="hadith-arabic" id="hadithArabic" style="display:none"></div>

        <!-- English -->
        <p class="hadith-english" id="hadithEnglish"></p>

        <!-- Urdu (hidden until toggled) -->
        <div class="hadith-urdu" id="hadithUrdu">
          <span class="urdu-label">اردو ترجمہ</span>
          <div id="hadithUrduText"></div>
        </div>

        <!-- Narrator -->
        <div class="hadith-narrator" id="hadithNarrator"></div>

        <!-- Reading time -->
        <p class="reading-time" id="readingTime">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Estimating…</span>
        </p>

        <!-- Actions -->
        <div class="action-bar">
          <button class="btn-action btn-primary" id="btnMarkRead">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Mark as Read
          </button>
          <button class="btn-action btn-secondary" id="btnBookmark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmark
          </button>
          <button class="btn-action btn-secondary" id="btnNote">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Reflect
          </button>
          <button class="btn-action btn-secondary" id="btnShare">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
        </div>

      </div>
    </div>

  </main>

  <!-- Notes modal -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal-box">
      <h3>Your Reflection</h3>
      <textarea id="noteText" placeholder="Write your thoughts or reflection on this Hadith…"></textarea>
      <div class="modal-actions">
        <button class="btn-action btn-secondary" id="btnNoteCancel" style="padding:9px 20px">Cancel</button>
        <button class="btn-action btn-primary" id="btnNoteSave" style="padding:9px 20px">Save</button>
      </div>
    </div>
  </div>

  <!-- Points toast -->
  <div class="points-toast" id="pointsToast" role="status" aria-live="polite"></div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <a href="index.html" class="footer-logo"><picture><source srcset="timelesshadith-logo.webp?v=2" type="image/webp"/><img src="timelesshadith-logo.png?v=2" alt="Timeless Hadith" height="24" width="80"/></picture></a>
      <ul class="footer-links">
        <li><a href="about.html">About</a></li>
        <li><a href="privacy.html">Privacy</a></li>
        <li><a href="terms.html">Terms</a></li>
      </ul>
    </div>
  </footer>

  <script src="js/page-chrome.js" defer></script>
  <script src="js/supabase-auth.js" defer></script>
  <script src="js/progress-api.js" defer></script>

  <script>
  (function () {
    'use strict';

    var SB_URL  = 'https://dwcsledifvnyrunxejzd.supabase.co';
    var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3Y3NsZWRpZnZueXJ1bnhlanpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTgwNzgsImV4cCI6MjA5MDUzNDA3OH0.Aww8QcExJF1tPwMPvqP5q0_avc3YJclqsFJcXptlnZo';

    var currentHadith = null;
    var isRead        = false;
    var isBookmarked  = false;
    var showUrdu      = false;

    // ── URL params ──
    var params   = new URLSearchParams(location.search);
    var hadithId = params.get('id');

    // ── Session ──
    function getToken() {
      try {
        var s = JSON.parse(localStorage.getItem('th_supabase_session') || 'null');
        return s && s.access_token ? s.access_token : null;
      } catch (e) { return null; }
    }

    // ── Font size (CSS variables) ──
    var FONT_STEPS_EN = [14, 15, 16, 17, 18, 20, 22];
    var FONT_STEPS_AR = [22, 24, 26, 28, 30, 32, 36];
    var fontIdx = parseInt(localStorage.getItem('th_reader_font') || '3', 10);
    fontIdx = Math.max(0, Math.min(FONT_STEPS_EN.length - 1, fontIdx));

    function applyFontSize() {
      var root = document.documentElement;
      root.style.setProperty('--reader-en-size', FONT_STEPS_EN[fontIdx] + 'px');
      root.style.setProperty('--reader-ar-size', FONT_STEPS_AR[fontIdx] + 'px');
      try { localStorage.setItem('th_reader_font', fontIdx); } catch(e) {}
    }
    applyFontSize();

    document.getElementById('fontDecrease').addEventListener('click', function () {
      if (fontIdx > 0) { fontIdx--; applyFontSize(); }
    });
    document.getElementById('fontIncrease').addEventListener('click', function () {
      if (fontIdx < FONT_STEPS_EN.length - 1) { fontIdx++; applyFontSize(); }
    });

    // ── Urdu toggle ──
    try { showUrdu = localStorage.getItem('th_reader_urdu') === '1'; } catch(e) {}
    function applyUrduToggle() {
      var urduEl = document.getElementById('hadithUrdu');
      var btn    = document.getElementById('urduToggle');
      if (urduEl) {
        if (showUrdu && document.getElementById('hadithUrduText').textContent.trim()) {
          urduEl.classList.add('visible');
        } else {
          urduEl.classList.remove('visible');
        }
      }
      if (btn) {
        btn.classList.toggle('active', showUrdu);
        btn.setAttribute('aria-pressed', showUrdu ? 'true' : 'false');
      }
      try { localStorage.setItem('th_reader_urdu', showUrdu ? '1' : '0'); } catch(e) {}
    }

    document.getElementById('urduToggle').addEventListener('click', function () {
      showUrdu = !showUrdu;
      applyUrduToggle();
    });

    // ── Jump to hadith ──
    function jumpTo(id) {
      if (!id || isNaN(id)) return;
      history.pushState(null, '', '?id=' + id);
      loadHadith(id);
    }
    document.getElementById('jumpBtn').addEventListener('click', function () {
      jumpTo(parseInt(document.getElementById('jumpInput').value, 10));
    });
    document.getElementById('jumpInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') jumpTo(parseInt(this.value, 10));
    });

    // ── Keyboard navigation (← →) ──
    document.addEventListener('keydown', function (e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (!currentHadith) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        e.preventDefault();
        var numId = parseInt(currentHadith.hadith_number, 10);
        jumpTo(e.key === 'ArrowRight' ? numId + 1 : Math.max(1, numId - 1));
      }
    });

    // ── Show/hide helpers ──
    function showSkeleton() { document.getElementById('skeletonLoader').style.display = ''; }
    function hideSkeleton() { document.getElementById('skeletonLoader').style.display = 'none'; }
    function showError(msg) {
      hideSkeleton();
      document.getElementById('errorState').style.display = '';
      document.getElementById('errorMsg').textContent = msg || 'Hadith not found.';
    }
    function showCard() {
      document.getElementById('hadithCard').style.display = '';
      document.getElementById('readerNav').style.display = '';
      document.getElementById('readerToolbar').style.display = '';
    }

    // ── Reading time ──
    function readingTime(text) {
      var mins = Math.ceil(((text || '').trim().split(/\s+/).length) / 180);
      return mins < 1 ? 'Under 1 min read' : mins + ' min read';
    }

    // ── Escape HTML ──
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Render hadith ──
    function render(h) {
      currentHadith = h;
      isRead = false;

      // Meta chips
      var meta = [];
      if (h.book_name_en) meta.push(h.book_name_en);
      if (h.chapter_en)   meta.push(h.chapter_en);
      if (h.hadith_number || h.in_book_ref) meta.push('No. ' + (h.hadith_number || h.in_book_ref));
      document.getElementById('hadithMeta').innerHTML = meta.map(function (m) {
        return '<span class="meta-chip">' + esc(m) + '</span>';
      }).join('');

      // Arabic
      var arabicEl = document.getElementById('hadithArabic');
      if (h.text_ar && h.text_ar.trim()) {
        arabicEl.textContent = h.text_ar;
        arabicEl.style.display = '';
      } else {
        arabicEl.style.display = 'none';
      }

      // English
      document.getElementById('hadithEnglish').textContent =
        h.text_en ? '“' + h.text_en + '”' : 'Translation not available.';

      // Urdu
      var urduText = h.urdu || '';
      document.getElementById('hadithUrduText').textContent = urduText;
      applyUrduToggle();

      // Narrator
      var ref = [];
      if (h.narrator)     ref.push('Narrated by ' + h.narrator);
      if (h.book_name_en) ref.push(h.book_name_en);
      if (h.hadith_number) ref.push('Hadith ' + h.hadith_number);
      document.getElementById('hadithNarrator').textContent = ref.join(' — ');

      // Reading time
      document.getElementById('readingTime').innerHTML =
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> <span>' +
        readingTime(h.text_en) + '</span>';

      // Title
      document.title = (h.book_name_en || 'Hadith') + (h.hadith_number ? ' #' + h.hadith_number : '') + ' — Timeless Hadith';

      // Nav
      document.getElementById('navTitle').textContent =
        (h.book_name_en || 'Hadith') + (h.hadith_number ? ' #' + h.hadith_number : '');

      // Jump input pre-fill
      document.getElementById('jumpInput').value = h.hadith_number;

      // Bookmark state
      var bks = getBookmarks();
      isBookmarked = bks.some(function (b) { return b.id === String(h.hadith_number); });
      updateBookmarkBtn();

      // Mark read button
      var btn = document.getElementById('btnMarkRead');
      btn.className = 'btn-action btn-primary';
      btn.disabled  = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mark as Read';

      hideSkeleton();
      showCard();

      // Auth banner
      document.getElementById('signInBanner').style.display = getToken() ? 'none' : 'flex';
    }

    // ── Fetch hadith ──
    async function loadHadith(id) {
      showSkeleton();
      document.getElementById('hadithCard').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';
      try {
        var url = SB_URL + '/rest/v1/hadiths?hadith_number=eq.' + encodeURIComponent(id) +
          '&select=id,hadith_number,in_book_ref,text_en,text_ar,urdu,narrator,book_name_en,chapter_en&limit=1';
        var res  = await fetch(url, { headers: { apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON } });
        var rows = await res.json();
        if (!rows || !rows.length) return showError('Hadith #' + id + ' not found.');
        render(rows[0]);
      } catch (e) {
        showError('Could not load. Please try again.');
      }
    }

    // ── Prev / Next ──
    document.getElementById('btnPrev').addEventListener('click', function () {
      if (currentHadith) jumpTo(Math.max(1, parseInt(currentHadith.hadith_number, 10) - 1));
    });
    document.getElementById('btnNext').addEventListener('click', function () {
      if (currentHadith) jumpTo(parseInt(currentHadith.hadith_number, 10) + 1);
    });

    // ── Mark as Read ──
    document.getElementById('btnMarkRead').addEventListener('click', async function () {
      var token = getToken();
      if (!token) {
        document.getElementById('signInBanner').style.display = 'flex';
        document.getElementById('signInBanner').scrollIntoView({ behavior: 'smooth' });
        return;
      }
      if (isRead) return;
      var btn = this;
      btn.disabled = true;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .7s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.09-4.43"/></svg> Saving…';
      try {
        var result = await window.ProgressAPI.markHadithAsRead({
          hadithId:       String(currentHadith.hadith_number),
          collectionName: 'Sahih al-Bukhari',
          bookName:       currentHadith.book_name_en || '',
          chapterName:    currentHadith.chapter_en   || '',
          hadithNumber:   String(currentHadith.hadith_number || currentHadith.in_book_ref || ''),
        });
        isRead = true;
        btn.className = 'btn-action btn-read-done';
        btn.disabled  = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Read ✓';
        var toast = document.getElementById('pointsToast');
        toast.textContent = result && !result.alreadyRead
          ? '+' + (result.pointsEarned || 10) + ' pts — Level ' + (result.currentLevel || 1)
          : 'Already in your reading history';
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 3200);
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mark as Read';
      }
    });

    // ── Bookmark ──
    function getBookmarks() {
      try { return JSON.parse(localStorage.getItem('th_bookmarks') || '[]'); } catch (e) { return []; }
    }
    function saveBookmarks(arr) { localStorage.setItem('th_bookmarks', JSON.stringify(arr)); }
    function updateBookmarkBtn() {
      var btn = document.getElementById('btnBookmark');
      btn.className = isBookmarked ? 'btn-action btn-bookmark-active' : 'btn-action btn-secondary';
      btn.innerHTML = isBookmarked
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> Bookmarked'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> Bookmark';
    }
    document.getElementById('btnBookmark').addEventListener('click', function () {
      if (!currentHadith) return;
      var bks = getBookmarks(), id = String(currentHadith.hadith_number);
      if (isBookmarked) {
        bks = bks.filter(function (b) { return b.id !== id; });
        isBookmarked = false;
      } else {
        bks.push({
          id: id, arabic: currentHadith.text_ar || '',
          text: (currentHadith.text_en || '').substring(0, 120),
          source: (currentHadith.book_name_en || 'Sahih al-Bukhari') + (currentHadith.hadith_number ? ' ' + currentHadith.hadith_number : ''),
        });
        isBookmarked = true;
      }
      saveBookmarks(bks);
      updateBookmarkBtn();
      var badge = document.getElementById('nav-bm-badge');
      if (badge) badge.setAttribute('data-count', bks.length);
    });

    // ── Notes modal ──
    document.getElementById('btnNote').addEventListener('click', function () {
      document.getElementById('noteModal').classList.add('open');
      document.getElementById('noteText').focus();
    });
    document.getElementById('btnNoteCancel').addEventListener('click', function () {
      document.getElementById('noteModal').classList.remove('open');
    });
    document.getElementById('noteModal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.remove('open');
    });
    document.getElementById('btnNoteSave').addEventListener('click', function () {
      var note = document.getElementById('noteText').value.trim();
      if (!note || !currentHadith) return;
      var notes = JSON.parse(localStorage.getItem('th_notes') || '{}');
      notes[String(currentHadith.hadith_number)] = note;
      localStorage.setItem('th_notes', JSON.stringify(notes));
      document.getElementById('noteModal').classList.remove('open');
      document.getElementById('noteText').value = '';
      var toast = document.getElementById('pointsToast');
      toast.textContent = 'Reflection saved ✓';
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 2400);
    });

    // ── Share ──
    document.getElementById('btnShare').addEventListener('click', function () {
      if (!currentHadith) return;
      var text = '“' + (currentHadith.text_en || '').substring(0, 200) + '…”\n\n— ' +
        (currentHadith.book_name_en || 'Sahih al-Bukhari') + ' | timelesshadith.com';
      if (navigator.share) {
        navigator.share({ title: 'Hadith — Timeless Hadith', text: text, url: location.href });
      } else {
        navigator.clipboard.writeText(text).then(function () {
          var toast = document.getElementById('pointsToast');
          toast.textContent = 'Copied to clipboard ✓';
          toast.classList.add('show');
          setTimeout(function () { toast.classList.remove('show'); }, 2000);
        });
      }
    });

    // ── Sign-in banner ──
    document.getElementById('signInBannerBtn').addEventListener('click', function () {
      if (window.TH_SB_AUTH && window.TH_SB_AUTH.signInWithGoogle) {
        window.TH_SB_AUTH.signInWithGoogle();
      }
    });

    // ── Init ──
    if (hadithId) {
      loadHadith(hadithId);
    } else {
      loadHadith(1);
    }

  })();
  </script>

</body>
