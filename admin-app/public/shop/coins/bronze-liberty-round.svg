<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img"
     aria-labelledby="t-bronze-liberty-round d-bronze-liberty-round">
  <title id="t-bronze-liberty-round">Liberty Round</title>
  <desc id="d-bronze-liberty-round">Bronze Round · 1 oz — Timeless Hadith Coin Shop placeholder</desc>
  <defs>
    <linearGradient id="g-bronze-liberty-round" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#EAD4B6"/>
      <stop offset="100%" stop-color="#C8A073"/>
    </linearGradient>
    <radialGradient id="r-bronze-liberty-round" cx="50%" cy="42%" r="55%">
      <stop offset="0%"   stop-color="#D4A87B" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#8E6240"   stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#54341C" stop-opacity="0.85"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#g-bronze-liberty-round)"/>
  <!-- decorative ring pattern -->
  <g fill="none" stroke="#8E6240" stroke-opacity="0.18">
    <circle cx="400" cy="400" r="380"/>
    <circle cx="400" cy="400" r="340"/>
    <circle cx="400" cy="400" r="300"/>
  </g>
  <!-- coin body -->
  <g>
    <circle cx="400" cy="400" r="240" fill="url(#r-bronze-liberty-round)"/>
    <circle cx="400" cy="400" r="240" fill="none" stroke="#54341C" stroke-width="6" stroke-opacity="0.85"/>
    <circle cx="400" cy="400" r="210" fill="none" stroke="#54341C" stroke-width="2" stroke-opacity="0.55"/>
    <circle cx="400" cy="400" r="170" fill="none" stroke="#54341C" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>
  <!-- coin face text -->
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle" fill="#2C1A0B">
    <text x="400" y="395" font-size="44" font-weight="700" letter-spacing="0.04em">
      LIBERTY ROUND
    </text>
    <text x="400" y="440" font-size="22" font-weight="500" opacity="0.85">
      Bronze Round · 1 oz
    </text>
  </g>
  <!-- watermark -->
  <text x="400" y="760" font-family="Inter, system-ui, sans-serif" text-anchor="middle"
