<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img"
     aria-labelledby="t-american-gold-eagle d-american-gold-eagle">
  <title id="t-american-gold-eagle">Gold Eagle</title>
  <desc id="d-american-gold-eagle">22-karat Gold · 1 oz — Timeless Hadith Coin Shop placeholder</desc>
  <defs>
    <linearGradient id="g-american-gold-eagle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFF4D9"/>
      <stop offset="100%" stop-color="#F5DD9C"/>
    </linearGradient>
    <radialGradient id="r-american-gold-eagle" cx="50%" cy="42%" r="55%">
      <stop offset="0%"   stop-color="#FFE9A8" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#D9B45A"   stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#8C6D27" stop-opacity="0.85"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#g-american-gold-eagle)"/>
  <!-- decorative ring pattern -->
  <g fill="none" stroke="#D9B45A" stroke-opacity="0.18">
    <circle cx="400" cy="400" r="380"/>
    <circle cx="400" cy="400" r="340"/>
    <circle cx="400" cy="400" r="300"/>
  </g>
  <!-- coin body -->
  <g>
    <circle cx="400" cy="400" r="240" fill="url(#r-american-gold-eagle)"/>
    <circle cx="400" cy="400" r="240" fill="none" stroke="#8C6D27" stroke-width="6" stroke-opacity="0.85"/>
    <circle cx="400" cy="400" r="210" fill="none" stroke="#8C6D27" stroke-width="2" stroke-opacity="0.55"/>
    <circle cx="400" cy="400" r="170" fill="none" stroke="#8C6D27" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>
  <!-- coin face text -->
  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle" fill="#3D2D04">
    <text x="400" y="395" font-size="44" font-weight="700" letter-spacing="0.04em">
      GOLD EAGLE
    </text>
    <text x="400" y="440" font-size="22" font-weight="500" opacity="0.85">
      22-karat Gold · 1 oz
    </text>
  </g>
  <!-- watermark -->
  <text x="400" y="760" font-family="Inter, system-ui, sans-serif" text-anchor="middle"
        fill="#8C6D27" fill-opacity="0.55" font-size="14" letter-spacing="0.18em">
    TIMELESS HADITH · PLACEHOLDER · REPLACE WITH REAL PHOTOGRAPHY
  </text>
</svg>