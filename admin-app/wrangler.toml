# wrangler.toml
# Timeless Hadith Shop — Cloudflare Pages deployment
# Docs: https://developers.cloudflare.com/pages/framework-guides/nextjs/

name = "timeless-hadith-shop"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Pages-specific config
pages_build_output_dir = ".vercel/output/static"

[vars]
# Non-secret env vars (safe to commit)
NEXT_PUBLIC_SUPABASE_URL = "https://dwcsledifvnyrunxejzd.supabase.co"
# Secrets are set in Cloudflare Dashboard → Settings → Environment Variables
# Do NOT put SUPABASE_SERVICE_ROLE_KEY, ADMIN_SECRET, or RESEND_API_KEY here

# ─── KV namespace binding ────────────────────────────────────────────────────
# Stores admin sessions and rate-limit counters. See lib/kv.ts.
#
# ONE-TIME SETUP (run from this directory):
#   npx wrangler kv:namespace create SHOP_KV
#   npx wrangler kv:namespace create SHOP_KV --preview
# Wrangler will print two `id` values — paste them below, then commit.
#
# Until SHOP_KV is bound, the code falls back to an in-memory store (per-edge,
# non-durable). Local dev works without KV; production MUST have it.
[[kv_namespaces]]
binding    = "SHOP_KV"
id         = ""   # ← paste production namespace id here
preview_id = ""   # ← paste preview/dev namespace id here
